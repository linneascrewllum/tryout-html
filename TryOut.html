<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solvation</title>
    <!-- Google Font & Font Awesome for icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #151a42;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(191, 196, 196, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(30, 144, 255, 0.07) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(135, 206, 250, 0.04) 0%, transparent 60%);
        }

        .card {
            max-width: 640px;
            width: 100%;
            background: linear-gradient(145deg, rgba(28, 48, 127, 0.969), rgba(12, 15, 19, 0.92));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 2.5rem 2.5rem 3rem;
            box-shadow: 
                0 30px 60px -15px rgba(0, 0, 0, 0.8),
                0 0 0 1px rgba(64, 224, 208, 0.08) inset,
                0 1px 0 rgba(255, 255, 255, 0.03) inset;
            transition: all 0.2s ease;
            border: 1px solid rgba(64, 224, 208, 0.06);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(64, 224, 208, 0.03), transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(30, 144, 255, 0.03), transparent 50%);
            pointer-events: none;
        }

        /* header */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 2.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(64, 224, 208, 0.08);
            position: relative;
            z-index: 1;
        }

        .icon-badge {
            background: linear-gradient(145deg, #40E0D0, #1E90FF);
            color: #0a0e12;
            width: 52px;
            height: 52px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 8px 20px -6px rgba(64, 224, 208, 0.25);
            position: relative;
        }

        .icon-badge::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 20px;
            padding: 2px;
            background: linear-gradient(135deg, #40E0D0, #00BFFF, #1E90FF);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.3;
        }

        .header h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #40E0D0 0%, #00BFFF 40%, #87CEFA 80%, #1E90FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .subhead {
            margin-left: auto;
            font-size: 0.8rem;
            font-weight: 600;
            color: #87CEFA;
            background: linear-gradient(135deg, rgba(30, 144, 255, 0.08), rgba(64, 224, 208, 0.05));
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid rgba(64, 224, 208, 0.08);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .subhead i {
            color: #40E0D0;
        }

        /* grid link cards */
        .link-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .link-item {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 1rem 1.5rem;
            text-decoration: none;
            color: #d4e8f0;
            font-weight: 500;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(64, 224, 208, 0.05), rgba(30, 144, 255, 0.05));
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .link-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(64, 224, 208, 0.02), rgba(0, 191, 255, 0.02));
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .link-item:hover::before {
            opacity: 1;
        }

        .link-item:hover {
            transform: translateY(-3px) scale(1.01);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02));
            border-color: rgba(64, 224, 208, 0.15);
            box-shadow: 
                0 16px 40px -12px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(64, 224, 208, 0.05) inset;
        }

        .link-item:active {
            transform: scale(0.97);
        }

        /* icon & text */
        .link-icon {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 18px;
            color: #87CEFA;
            font-size: 1.4rem;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .link-item:hover .link-icon {
            background: linear-gradient(135deg, rgba(64, 224, 208, 0.12), rgba(30, 144, 255, 0.12));
            color: #40E0D0;
            box-shadow: 0 6px 20px -6px rgba(64, 224, 208, 0.15);
            transform: scale(1.05) rotate(-2deg);
            border-color: rgba(64, 224, 208, 0.12);
        }

        .link-name {
            flex: 1;
            font-weight: 600;
            letter-spacing: -0.01em;
            position: relative;
            z-index: 1;
            color: #d4e8f0;
        }

        .link-name small {
            font-weight: 400;
            font-size: 0.75rem;
            color: #87CEFA;
            margin-left: 10px;
            background: linear-gradient(135deg, rgba(135, 206, 250, 0.06), rgba(64, 224, 208, 0.04));
            padding: 2px 12px;
            border-radius: 30px;
            display: inline-block;
            border: 1px solid rgba(135, 206, 250, 0.04);
        }

        .link-arrow {
            color: rgba(135, 206, 250, 0.2);
            font-size: 1.2rem;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .link-item:hover .link-arrow {
            color: #40E0D0;
            transform: translateX(8px) scale(1.1);
        }

        /* footer note */
        .footer-note {
            margin-top: 2.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: rgba(135, 206, 250, 0.4);
            border-top: 1px solid rgba(64, 224, 208, 0.06);
            padding-top: 1.5rem;
            flex-wrap: wrap;
            gap: 0.8rem;
            position: relative;
            z-index: 1;
        }

        .footer-note span i {
            color: #40E0D0;
            margin: 0 4px;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        .footer-note span:hover i {
            opacity: 1;
        }

        .footer-note .badge {
            background: linear-gradient(135deg, rgba(64, 224, 208, 0.04), rgba(30, 144, 255, 0.04));
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #87CEFA;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(64, 224, 208, 0.04);
            transition: all 0.3s ease;
        }

        .footer-note .badge:hover {
            background: linear-gradient(135deg, rgba(64, 224, 208, 0.08), rgba(30, 144, 255, 0.08));
            border-color: rgba(64, 224, 208, 0.08);
            transform: scale(1.02);
        }

        .footer-note .badge i {
            font-size: 0.7rem;
            color: #40E0D0;
        }

        /* responsive */
        @media (max-width: 480px) {
            .card {
                padding: 1.5rem 1.2rem 2rem;
                border-radius: 32px;
            }
            .header h2 {
                font-size: 1.6rem;
            }
            .header .subhead {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
            .link-item {
                padding: 0.9rem 1rem;
                font-size: 1rem;
            }
            .link-icon {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
                margin-right: 14px;
            }
            .link-name small {
                display: none;
            }
            .footer-note {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
        }

        /* individual link icon variations — gradient style */
        .link-item:nth-child(1) .link-icon { color: #40E0D0; }
        .link-item:nth-child(1):hover .link-icon { background: linear-gradient(135deg, rgba(64, 224, 208, 0.15), rgba(0, 191, 255, 0.15)); color: #40E0D0; }

        .link-item:nth-child(2) .link-icon { color: #87CEFA; }
        .link-item:nth-child(2):hover .link-icon { background: linear-gradient(135deg, rgba(30, 144, 255, 0.15), rgba(70, 130, 180, 0.15)); color: #87CEFA; }

        .link-item:nth-child(3) .link-icon { color: #00BFFF; }
        .link-item:nth-child(3):hover .link-icon { background: linear-gradient(135deg, rgba(0, 191, 255, 0.15), rgba(30, 144, 255, 0.15)); color: #00BFFF; }

        .link-item:nth-child(4) .link-icon { color: #87CEFA; }
        .link-item:nth-child(4):hover .link-icon { background: linear-gradient(135deg, rgba(30, 144, 255, 0.15), rgba(70, 130, 180, 0.15)); color: #87CEFA; }

        .link-item:nth-child(5) .link-icon { color: #40E0D0; }
        .link-item:nth-child(5):hover .link-icon { background: linear-gradient(135deg, rgba(64, 224, 208, 0.15), rgba(0, 191, 255, 0.15)); color: #40E0D0; }

        .link-item:nth-child(6) .link-icon { color: #87CEFA; }
        .link-item:nth-child(6):hover .link-icon { background: linear-gradient(135deg, rgba(135, 206, 250, 0.15), rgba(30, 144, 255, 0.15)); color: #87CEFA; }
    </style>
</head>
<body>
    <div class="card">
        <!-- header -->
        <div class="header">
            <div class="icon-badge">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h2>Solvation</h2>
            <div class="subhead">
                <i class="fas fa-bolt"></i> 6 platform
            </div>
        </div>

        <!-- link list -->
        <div class="link-grid">
            <!-- Pahamify -->
            <a href="https://tryout.pahamify.com/home" target="_blank" class="link-item">
                <div class="link-icon">
                    <i class="fas fa-brain"></i>
                </div>
                <div class="link-name">
                    Pahamify
                    <small>tryout</small>
                </div>
                <div class="link-arrow">
                    <i class="fas fa-arrow-right"></i>
                </div>
            </a>

            <!-- Pintarly -->
            <a href="https://ptn.pintarly.id/home" target="_blank" class="link-item">
                <div class="link-icon">
                    <i class="fas fa-pencil-alt"></i>
                </div>
                <div class="link-name">
                    Pintarly
                    <small>premium</small>
                </div>
                <div class="link-arrow">
                    <i class="fas fa-arrow-right"></i>
                </div>
            </a>

            <!-- Analitica — fixed icon -->
            <a href="https://web.analitica.id/activities" target="_blank" class="link-item">
                <div class="link-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="link-name">
                    Analitica
                    <small>activities</small>
                </div>
                <div class="link-arrow">
                    <i class="fas fa-arrow-right"></i>
                </div>
            </a>

            <!-- SainsIn -->
            <a href="https://sainsin.com/dashboard" target="_blank" class="link-item">
                <div class="link-icon">
                    <i class="fas fa-flask"></i>
                </div>
                <div class="link-name">
                    SainsIn
                    <small>dashboard</small>
                </div>
                <div class="link-arrow">
                    <i class="fas fa-arrow-right"></i>
                </div>
            </a>

            <!-- Khan Academy -->
            <a href="https://www.khanacademy.org/profile/me/courses" target="_blank" class="link-item">
                <div class="link-icon">
                    <i class="fas fa-chalkboard-teacher"></i>
                </div>
                <div class="link-name">
                    Khan Academy
                    <small>courses</small>
                </div>
                <div class="link-arrow">
                    <i class="fas fa-arrow-right"></i>
                </div>
            </a>

            <!-- ChemQuiz -->
            <a href="https://chemquiz.net/quizzes/" target="_blank" class="link-item">
                <div class="link-icon">
                    <i class="fas fa-atom"></i>
                </div>
                <div class="link-name">
                    ChemQuiz
                    <small>quizzes</small>
                </div>
                <div class="link-arrow">
                    <i class="fas fa-arrow-right"></i>
                </div>
            </a>
        </div>

        <!-- footer -->
        <div class="footer-note">
            <span>
                <i class="fas-regular fa-book-open"></i> 
                33550336th cycle
            </span>
            <div class="badge">
                <i class="fas fa-check-circle"></i> 
                16 #1
            </div>
        </div>
    </div>
</body>
</html>
