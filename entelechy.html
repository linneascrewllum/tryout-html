    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #153137;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(38, 95, 100, 0.353) 0%, transparent 40%),
                radial-gradient(circle at 85% 75%, rgba(30, 101, 97, 0.418) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(39, 113, 140, 0.664) 0%, transparent 60%);
        }

        .card {
            max-width: 640px;
            width: 100%;
            background: linear-gradient(160deg, rgba(36, 80, 92, 0.94), rgba(34, 68, 76, 0.9));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 2.5rem 2.5rem 3rem;
            box-shadow: 
                0 30px 60px -15px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(132, 163, 166, 0.10) inset,
                0 1px 0 rgba(255, 255, 255, 0.04) inset;
            transition: all 0.2s ease;
            border: 1px solid rgba(132, 163, 166, 0.06);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 25% 30%, rgba(132, 163, 166, 0.05), transparent 40%),
                radial-gradient(circle at 75% 70%, rgba(111, 134, 108, 0.04), transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(80, 111, 87, 0.03), transparent 50%);
            pointer-events: none;
        }

        /* header */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 2.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(132, 163, 166, 0.08);
            position: relative;
            z-index: 1;
        }

        .icon-badge {
            background: linear-gradient(145deg, #84A3A6, #6F866C);
            color: #1a2420;
            width: 52px;
            height: 52px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 8px 20px -6px rgba(132, 163, 166, 0.2);
            position: relative;
        }

        .icon-badge::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 20px;
            padding: 2px;
            background: linear-gradient(135deg, #84A3A6, #6F866C, #506F57);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.25;
        }

        .header h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #84A3A6 0%, #a6bea2 35%, #9eb1ac 70%, #cee1d2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .subhead {
            margin-left: auto;
            font-size: 0.8rem;
            font-weight: 600;
            color: #84A3A6;
            background: linear-gradient(135deg, rgba(132, 163, 166, 0.08), rgba(111, 134, 108, 0.04));
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid rgba(132, 163, 166, 0.06);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .subhead i {
            color: #6F866C;
        }

        /* grid link cards */
        .link-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .link-item {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.005));
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 1rem 1.5rem;
            text-decoration: none;
            color: #d0dcd8;
            font-weight: 500;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(132, 163, 166, 0.06), rgba(111, 134, 108, 0.03));
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .link-item:hover::before {
            opacity: 1;
        }

        .link-item:hover {
            transform: translateY(-3px) scale(1.01);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
            border-color: rgba(132, 163, 166, 0.15);
            box-shadow: 
                0 16px 40px -12px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(132, 163, 166, 0.05) inset;
        }

        .link-item:active {
            transform: scale(0.97);
        }

        /* icon & text */
        .link-icon {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.005));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 18px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        /* brand-specific SVG styling */
        .brand-svg {
            width: 22px;
            height: 22px;
            opacity: 0.85; /* Softened standard opacity */
            transition: all 0.3s ease;
        }

        .link-item:hover .brand-svg {
            opacity: 1;
            transform: scale(1.05) rotate(-2deg);
        }

        .link-item:hover .link-icon {
            background: linear-gradient(135deg, rgba(132, 163, 166, 0.12), rgba(111, 134, 108, 0.06));
            box-shadow: 0 6px 20px -6px rgba(132, 163, 166, 0.12);
            border-color: rgba(132, 163, 166, 0.08);
        }

        .link-name {
            flex: 1;
            font-weight: 600;
            letter-spacing: -0.01em;
            position: relative;
            z-index: 1;
            color: #d0dcd8;
        }

        .link-name small {
            font-weight: 400;
            font-size: 0.75rem;
            color: #8a9e98;
            margin-left: 10px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
            padding: 2px 12px;
            border-radius: 30px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .link-arrow {
            color: rgba(138, 158, 152, 0.2);
            font-size: 1.2rem;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .link-item:hover .link-arrow {
            color: #6F866C;
            transform: translateX(8px) scale(1.1);
        }

        /* GitHub icon row */
        .github-row {
            margin-top: 1.8rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(132, 163, 166, 0.06);
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #8a9e98;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 6px 14px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .github-link i {
            font-size: 1.1rem;
            color: #6a7e78;
            transition: color 0.3s ease;
        }

        .github-link:hover {
            color: #84A3A6;
            background: rgba(132, 163, 166, 0.04);
            border-color: rgba(132, 163, 166, 0.06);
            transform: translateY(-1px);
        }

        .github-link:hover i {
            color: #84A3A6;
        }

        /* footer note */
        .footer-note {
            margin-top: 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: rgba(138, 158, 152, 0.4);
            border-top: 1px solid rgba(132, 163, 166, 0.04);
            padding-top: 1.5rem;
            flex-wrap: wrap;
            gap: 0.8rem;
            position: relative;
            z-index: 1;
        }

        .footer-note span i {
            color: #6F866C;
            margin: 0 4px;
            opacity: 0.4;
            transition: opacity 0.3s ease;
        }

        .footer-note span:hover i {
            opacity: 0.8;
        }

        .footer-note .badge {
            background: linear-gradient(135deg, rgba(132, 163, 166, 0.04), rgba(111, 134, 108, 0.02));
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #84A3A6;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(132, 163, 166, 0.04);
            transition: all 0.3s ease;
        }

        .footer-note .badge:hover {
            background: linear-gradient(135deg, rgba(132, 163, 166, 0.06), rgba(111, 134, 108, 0.04));
            border-color: rgba(132, 163, 166, 0.06);
            transform: scale(1.02);
        }

        .footer-note .badge i {
            font-size: 0.7rem;
            color: #6F866C;
        }

        /* responsive */
        @media (max-width: 480px) {
            .card {
                padding: 1.5rem 1.2rem 2rem;
                border-radius: 32px;
            }
            .header h2 {
                font-size: 1.6rem;
            }
            .header .subhead {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
            .link-item {
                padding: 0.9rem 1rem;
                font-size: 1rem;
            }
            .link-icon {
                width: 40px;
                height: 40px;
                margin-right: 14px;
            }
            .brand-svg {
                width: 18px;
                height: 18px;
            }
            .link-name small {
                display: none;
            }
            .github-row {
                gap: 0.8rem;
            }
            .github-link {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
            .footer-note {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
        }
    </style>
</head>
