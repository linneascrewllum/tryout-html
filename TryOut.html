<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub · 雅</title>
    <!-- Google Font & Font Awesome for icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background-image: radial-gradient(circle at 10% 30%, rgba(99, 102, 241, 0.05) 0%, transparent 30%),
                              radial-gradient(circle at 90% 70%, rgba(168, 85, 247, 0.06) 0%, transparent 40%);
        }

        .card {
            max-width: 640px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2.5rem 2.5rem 3rem;
            box-shadow: 0 25px 50px -10px rgba(0, 20, 60, 0.15),
                        0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* header */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 2.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(99, 102, 241, 0.15);
        }

        .icon-badge {
            background: linear-gradient(145deg, #6366f1, #8b5cf6);
            color: white;
            width: 52px;
            height: 52px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 8px 16px -6px rgba(99, 102, 241, 0.3);
        }

        .header h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e1b4b 0%, #4f46e5 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .subhead {
            margin-left: auto;
            font-size: 0.8rem;
            font-weight: 500;
            color: #6b7280;
            background: rgba(255,255,255,0.5);
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid rgba(156, 163, 175, 0.2);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .subhead i {
            color: #8b5cf6;
        }

        /* grid link cards */
        .link-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 1rem 1.5rem;
            text-decoration: none;
            color: #1e293b;
            font-weight: 500;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .link-item:hover {
            transform: translateY(-3px) scale(1.01);
            background: white;
            border-color: #c7d2fe;
            box-shadow: 0 16px 30px -12px rgba(99, 102, 241, 0.20);
        }

        .link-item:active {
            transform: scale(0.97);
        }

        /* icon & text */
        .link-icon {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, #eef2ff, #e0e7ff);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 18px;
            color: #4f46e5;
            font-size: 1.4rem;
            transition: 0.2s;
        }

        .link-item:hover .link-icon {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            box-shadow: 0 6px 12px -6px #6366f180;
        }

        .link-name {
            flex: 1;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .link-name small {
            font-weight: 400;
            font-size: 0.75rem;
            color: #6b7280;
            margin-left: 10px;
            background: #f1f5f9;
            padding: 2px 12px;
            border-radius: 30px;
            display: inline-block;
        }

        .link-arrow {
            color: #94a3b8;
            font-size: 1.2rem;
            transition: 0.25s;
        }

        .link-item:hover .link-arrow {
            color: #4f46e5;
            transform: translateX(6px);
        }

        /* special brand colors (accent dot) */
        .link-item .accent-dot {
            width: 8px;
            height: 8px;
            border-radius: 20px;
            margin-right: 6px;
            background: #4f46e5;
        }

        /* footer note */
        .footer-note {
            margin-top: 2.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: #6b7280;
            border-top: 1px solid rgba(156, 163, 175, 0.2);
            padding-top: 1.5rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .footer-note span i {
            color: #8b5cf6;
            margin: 0 4px;
        }

        .footer-note .badge {
            background: rgba(99, 102, 241, 0.08);
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #4f46e5;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .footer-note .badge i {
            font-size: 0.7rem;
        }

        /* responsive */
        @media (max-width: 480px) {
            .card {
                padding: 1.5rem 1.2rem 2rem;
                border-radius: 32px;
            }
            .header h2 {
                font-size: 1.6rem;
            }
            .header .subhead {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
            .link-item {
                padding: 0.9rem 1rem;
                font-size: 1rem;
            }
            .link-icon {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
                margin-right: 14px;
            }
            .link-name small {
                display: none; /* hide tag on small */
            }
            .footer-note {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
        }

        /* tiny extra polish */
        .link-item:nth-child(1) .link-icon { background: #fef3c7; color: #d97706; }
        .link-item:nth-child(1):hover .link-icon { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }

        .link-item:nth-child(2) .link-icon { background: #dbeafe; color: #2563eb; }
        .link-item:nth-child(2):hover .link-icon { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }

        .link-item:nth-child(3) .link-icon { background: #ede9fe; color: #7c3aed; }
        .link-item:nth-child(3):hover .link-icon { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; }

        .link-item:nth-child(4) .link-icon { background: #d1fae5; color: #059669; }
        .link-item:nth-child(4):hover .link-icon { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    </style>
</head>
<body>
    <div class="card">
        <!-- header -->
        <div class="header">
            <div class="icon-badge">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h2>Study Hub</h2>
            <div class="subhead">
                <i class="fas fa-bolt"></i> 4 platform
            </div>
        </div>

        <!-- link list -->
        <div class="link-grid">
            <a href="https://tryout.pahamify.com/home" target="_blank" class="link-item" style="transition: all 0.2s;">
                <div class="link-icon">
                    <i class="fas fa-brain"></i>
                </div>
                <div class="link-name">
                    Pahamify
                    <small>tryout</small>
                </div>
                <div class="link-arrow">
                    <i class="fas fa-arrow-right"></i>
                </div>
            </a>

            <a href="https://www.pintarly.id/premium?success=true" target="_blank" class="link-item">
                <div class="link-icon">
                    <i class="fas fa-pencil-alt"></i>
                </div>
                <div class="link-name">
                    Pintarly
                    <small>premium</small>
                </div>
                <div class="link-arrow">
                    <i class="fas fa-arrow-right"></i>
                </div>
            </a>

            <a href="https://web.analitica.id/activities" target="_blank" class="link-item">
                <div class="link-icon">
                    <i class="fas fa-chart-simple"></i>
                </div>
                <div class="link-name">
                    Analitica
                    <small>activities</small>
                </div>
                <div class="link-arrow">
                    <i class="fas fa-arrow-right"></i>
                </div>
            </a>

            <a href="https://sainsin.com/dashboard" target="_blank" class="link-item">
                <div class="link-icon">
                    <i class="fas fa-flask"></i>
                </div>
                <div class="link-name">
                    SainsIn
                    <small>dashboard</small>
                </div>
                <div class="link-arrow">
                    <i class="fas fa-arrow-right"></i>
                </div>
            </a>
        </div>

        <!-- footer -->
        <div class="footer-note">
            <span>
                <i class="fas-regular fa-book-open"></i> 
                akses cepat · 2026
            </span>
            <div class="badge">
                <i class="fas fa-check-circle"></i> 
                siap belajar
            </div>
        </div>
    </div>
</body>
</html>
